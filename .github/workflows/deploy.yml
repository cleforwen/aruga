name: Deploy to Oracle Cloud

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Package application
        run: |
          tar -czvf aruga-app.tar.gz --exclude='.git' --exclude='frontend/node_modules' --exclude='backend/.gradle' --exclude='backend/build' .

      - name: Copy archive to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.APP_SERVER_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "aruga-app.tar.gz"
          target: "~/"

      - name: Deploy on App Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.APP_SERVER_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p ~/aruga-app
            tar -xzvf ~/aruga-app.tar.gz -C ~/aruga-app
            rm ~/aruga-app.tar.gz
            cd ~/aruga-app
            
            # Setup database connection
            echo "DB_JDBC_URL=jdbc:postgresql://${{ secrets.DB_SERVER_HOST }}:5432/aruga" > .env
            echo "DB_REACTIVE_URL=postgresql://${{ secrets.DB_SERVER_HOST }}:5432/aruga" >> .env
            
            # Redeploy Docker containers
            docker compose down
            docker compose up -d --build
