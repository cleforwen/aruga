services:
  postgres:
    image: postgres:16-alpine
    container_name: aruga-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: aruga
      POSTGRES_PASSWORD: aruga
      POSTGRES_DB: aruga
    volumes:
      - aruga_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aruga"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  aruga_pg_data:
