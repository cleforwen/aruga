services:
  backend:
    build:
      context: ./backend
    container_name: aruga-backend
    restart: unless-stopped
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: ${DB_JDBC_URL:-jdbc:postgresql://10.0.0.216:5432/aruga}
      QUARKUS_DATASOURCE_REACTIVE_URL: ${DB_REACTIVE_URL:-postgresql://10.0.0.216:5432/aruga}
      QUARKUS_DATASOURCE_USERNAME: ${DB_USER:-aruga}
      QUARKUS_DATASOURCE_PASSWORD: ${DB_PASSWORD:-aruga}

  caddy:
    image: caddy:2-alpine
    container_name: aruga-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./frontend/dist:/usr/share/caddy
    depends_on:
      - backend
